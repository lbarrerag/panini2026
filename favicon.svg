<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="rb" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e63030"/>
      <stop offset="17%"  stop-color="#e67e00"/>
      <stop offset="34%"  stop-color="#c8e000"/>
      <stop offset="51%"  stop-color="#00c8a0"/>
      <stop offset="68%"  stop-color="#007be6"/>
      <stop offset="85%"  stop-color="#7b2fbe"/>
      <stop offset="100%" stop-color="#e630a0"/>
    </linearGradient>
    <clipPath id="clip"><rect width="100" height="100" rx="20"/></clipPath>
  </defs>
  <rect width="100" height="100" rx="20" fill="#111"/>
  <rect y="0" width="100" height="4" fill="url(#rb)"/>
  <!-- "2" y "6" en blanco estilo FIFA -->
  <text x="18" y="68" font-family="Arial Black,sans-serif" font-size="68"
        font-weight="900" fill="white" opacity="0.95">2</text>
  <text x="52" y="92" font-family="Arial Black,sans-serif" font-size="68"
        font-weight="900" fill="white" opacity="0.95">6</text>
  <!-- Trofeo centrado -->
  <text x="50" y="62" text-anchor="middle" font-size="36">🏆</text>
  <!-- FIFA label -->
  <rect x="28" y="76" width="44" height="16" rx="4" fill="white"/>
  <text x="50" y="88" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="10" font-weight="900" fill="#7B1818" letter-spacing="2">FIFA</text>
  <rect y="96" width="100" height="4" fill="url(#rb)"/>
</svg>
